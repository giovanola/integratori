name: Monitor and Update Integratori Database

on:
  schedule:
    - cron: '0 7 * * 1'    # Jeden Montag um 07:00 UTC
  workflow_dispatch:         # Manuell auslösbar über GitHub UI → Actions → Run workflow

permissions:
  contents: write
  issues: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pdfplumber
        run: pip install pdfplumber --quiet

      - name: Read current known version
        id: current
        run: |
          VERSION=$(cat .github/integratori-version.txt 2>/dev/null || echo "11")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Bekannte Version: $VERSION"

      - name: Check for new PDF version
        id: check
        run: |
          CURRENT=${{ steps.current.outputs.version }}
          NEXT=$((CURRENT + 1))
          BASE="https://www.salute.gov.it/new/sites/default/files"
          URL_AZ="${BASE}/INTEGRATORI_NOTIFICATI_ORD_AZ_${NEXT}.pdf"
          URL_PROD="${BASE}/INTEGRATORI_NOTIFICATI_ORD_PROD_${NEXT}.pdf"

          STATUS_AZ=$(curl -s -o /dev/null -w "%{http_code}" --head --max-time 20 "$URL_AZ")
          STATUS_PROD=$(curl -s -o /dev/null -w "%{http_code}" --head --max-time 20 "$URL_PROD")
          echo "AZ   v${NEXT}: HTTP $STATUS_AZ"
          echo "PROD v${NEXT}: HTTP $STATUS_PROD"

          if [ "$STATUS_AZ" = "200" ]; then
            echo "found=true"       >> $GITHUB_OUTPUT
            echo "pdf_url=$URL_AZ" >> $GITHUB_OUTPUT
            echo "variant=AZ"      >> $GITHUB_OUTPUT
          elif [ "$STATUS_PROD" = "200" ]; then
            echo "found=true"        >> $GITHUB_OUTPUT
            echo "pdf_url=$URL_PROD" >> $GITHUB_OUTPUT
            echo "variant=PROD"      >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "Keine neue Version. Naechste Pruefung naechsten Montag."
          fi
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT

      - name: Download new PDF
        if: steps.check.outputs.found == 'true'
        run: |
          curl -L --max-time 180 --retry 3 --retry-delay 5 \
            "${{ steps.check.outputs.pdf_url }}" -o /tmp/integratori_new.pdf
          echo "Download: $(du -sh /tmp/integratori_new.pdf)"

      - name: Convert PDF to JSON
        if: steps.check.outputs.found == 'true'
        run: |
          python3 .github/scripts/pdf_to_json.py \
            /tmp/integratori_new.pdf \
            data/integratori.json

      - name: Commit and push updated database
        if: steps.check.outputs.found == 'true'
        run: |
          NEXT=${{ steps.check.outputs.next_version }}
          echo "$NEXT" > .github/integratori-version.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/integratori.json .github/integratori-version.txt
          git commit -m "data: Integratori-Datenbank automatisch aktualisiert auf Version ${NEXT}"
          git push
          echo "Push abgeschlossen — GitHub Pages deployt automatisch."

      - name: Create success notification issue
        if: steps.check.outputs.found == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const next    = '${{ steps.check.outputs.next_version }}';
            const url     = '${{ steps.check.outputs.pdf_url }}';
            const variant = '${{ steps.check.outputs.variant }}';
            const body = [
              `## Database Integratori aggiornato automaticamente`,
              ``,
              `| Campo        | Valore |`,
              `|--------------|--------|`,
              `| Versione     | ${next} |`,
              `| Variante PDF | ${variant === 'AZ' ? 'Ordine per Azienda' : 'Ordine per Prodotto'} |`,
              `| PDF sorgente | [Scarica](${url}) |`,
              `| File         | \`data/integratori.json\` aggiornato |`,
              `| Sito live    | https://giovanola.github.io/integratori/ |`,
              ``,
              `---`,
              `**Unica azione manuale richiesta:**`,
              `Aggiornare in \`index.html\`:`,
              `- \`APP_VERSION\` (es. v5.7)`,
              `- \`APP_RELEASE\` (data odierna, formato YYYY-MM-DD)`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Database aggiornato automaticamente — versione ${next}`,
              body,
              labels: ['data-update'],
            });

      - name: Create error notification issue
        if: steps.check.outputs.found == 'true' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const next = '${{ steps.check.outputs.next_version }}';
            const url  = '${{ steps.check.outputs.pdf_url }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `ERRORE: Aggiornamento automatico fallito — versione ${next}`,
              body: [
                `## Aggiornamento automatico fallito`,
                ``,
                `Nuovo PDF rilevato ma la conversione ha fallito (struttura PDF cambiata?).`,
                ``,
                `**PDF:** [${url}](${url})`,
                ``,
                `**Azione:** caricare il PDF manualmente su Claude per la conversione.`,
              ].join('\n'),
              labels: ['data-update', 'bug'],
            });

