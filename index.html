  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:        #1B6B45;
      --accent-mid:    #155735;
      --accent-light:  #2a8a5a;
      --accent-dim:    rgba(27, 107, 69, 0.10);
      --accent-border: rgba(27, 107, 69, 0.30);
      --bg:            #F4F6F8;
      --bg-card:       #FFFFFF;
      --bg-card-hover: #F0F4F2;
      --border:        #D1D9E0;
      --border-sub:    #E4E9ED;
      --text:          #111827;
      --text-muted:    #4B5563;
      --text-dim:      #9CA3AF;
      --found:         #166534;
      --found-bg:      rgba(22, 101, 52, 0.07);
      --found-border:  rgba(22, 101, 52, 0.30);
      --bad:           #991B1B;
      --bad-bg:        rgba(153, 27, 27, 0.07);
      --bad-border:    rgba(153, 27, 27, 0.28);
      --radius:        8px;
      --radius-lg:     12px;
      --topbar-h:      58px;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:     0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Topbar ---- */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: var(--topbar-h);
      display: flex; align-items: center;
      padding: 0 1.5rem;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-sub);
      box-shadow: var(--shadow-sm);
      gap: 0.625rem;
    }
    .topbar-mark {
      width: 30px; height: 30px; border-radius: 7px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .topbar-mark svg { color: var(--accent); }
    .topbar-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1rem; font-weight: 700;
      color: var(--text); letter-spacing: -.015em;
    }
    .topbar-sep  { color: var(--border); margin: 0 .2rem; }
    .topbar-sub  { font-size: .78rem; color: var(--text-muted); }
    .lang-switcher { margin-left: auto; display: flex; gap: 2px; }
    .lang-btn {
      background: none; border: 1px solid transparent;
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: .72rem; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase;
      padding: .25rem .55rem; border-radius: 5px;
      cursor: pointer; transition: color .15s, border-color .15s, background .15s;
    }
    .lang-btn:hover { color: var(--text-muted); border-color: var(--border); }
    .lang-btn.active {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }

    /* ---- Progress bar ---- */
    .load-bar {
      position: fixed; top: var(--topbar-h); left: 0; right: 0;
      height: 3px; background: var(--border-sub); z-index: 99;
    }
    .load-bar-fill {
      height: 100%; width: 0%;
      background: var(--accent-light);
      transition: width .3s ease;
    }
    .load-bar.hidden { display: none; }

    /* ---- Hero ---- */
    .hero {
      max-width: 680px; margin: 0 auto;
      padding: 3rem 1.5rem 0;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .72rem; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      padding: .25rem .7rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 20px;
    }
    .hero h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.65rem, 4.5vw, 2.3rem);
      font-weight: 700; line-height: 1.18;
      letter-spacing: -.025em; color: var(--text);
      margin-bottom: .75rem;
    }
    .hero-desc {
      font-size: .9rem; color: var(--text-muted);
      line-height: 1.7; margin-bottom: 2rem; max-width: 520px;
    }

    /* ---- Search ---- */
    .search-wrap { position: relative; }
    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: .9rem 3rem .9rem 3.125rem;
      outline: none;
      box-shadow: var(--shadow-sm);
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim), var(--shadow-sm);
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-icon {
      position: absolute; left: 1rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
    }
    .search-clear {
      position: absolute; right: .875rem; top: 50%;
      transform: translateY(-50%);
      background: var(--border); border: none;
      color: var(--text-muted); cursor: pointer;
      width: 20px; height: 20px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      transition: background .1s, color .1s;
    }
    .search-clear.visible { display: flex; }
    .search-clear:hover { background: var(--text-muted); color: white; }

    /* ---- Stats ---- */
    .stats-bar {
      max-width: 680px; margin: .625rem auto 0;
      padding: 0 1.5rem;
      font-size: .75rem; color: var(--text-dim); min-height: 1.2em;
    }

    /* ---- Results ---- */
    .results {
      max-width: 680px; margin: 0 auto;
      padding: 1.75rem 1.5rem 4rem;
    }
    .state-empty {
      padding: 3.5rem 1rem; text-align: center; color: var(--text-dim);
    }
    .state-empty .hint { font-size: .825rem; margin-top: .5rem; }
    .state-loading {
      padding: 3rem 1rem; text-align: center;
      color: var(--text-muted); font-size: .875rem;
    }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status banner */
    .status-banner {
      display: flex; align-items: center; gap: .75rem;
      padding: .875rem 1.125rem; border-radius: var(--radius);
      margin-bottom: 1.125rem; font-size: .875rem; font-weight: 500;
      box-shadow: var(--shadow-sm);
    }
    .status-banner.found    { background: var(--found-bg); border: 1px solid var(--found-border); color: var(--found); }
    .status-banner.notfound { background: var(--bad-bg);   border: 1px solid var(--bad-border);   color: var(--bad); }
    .banner-icon {
      flex-shrink: 0; width: 20px; height: 20px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .status-banner.found    .banner-icon { background: rgba(22,101,52,.15); }
    .status-banner.notfound .banner-icon { background: rgba(153,27,27,.12); }
    .banner-text strong { display: block; }
    .banner-text small  { font-size: .78rem; font-weight: 400; opacity: .8; margin-top: .1rem; display: block; }

    /* CSV button */
    .csv-btn {
      margin-left: auto; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(22,101,52,.10);
      border: 1px solid var(--found-border);
      color: var(--found);
      font-family: 'Inter', sans-serif;
      font-size: .72rem; font-weight: 600;
      padding: .35rem .75rem; border-radius: 6px;
      cursor: pointer; transition: background .15s;
      white-space: nowrap;
    }
    .csv-btn:hover { background: rgba(22,101,52,.18); }

    /* Result card */
    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border-sub);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1.25rem; margin-bottom: .625rem;
      box-shadow: var(--shadow-sm);
      transition: background .12s, box-shadow .12s;
    }
    .result-card:hover { background: var(--bg-card-hover); box-shadow: var(--shadow-md); }
    .card-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.05rem; font-weight: 600;
      color: var(--text); margin-bottom: .625rem; line-height: 1.3;
    }
    .card-meta { display: flex; flex-wrap: wrap; gap: .5rem 1.5rem; align-items: center; }
    .meta-field { display: flex; flex-direction: column; gap: .1rem; }
    .meta-label { font-size: .67rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-dim); }
    .meta-value { font-size: .85rem; color: var(--text-muted); }
    .badge-reg {
      margin-left: auto;
      font-size: .67rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      color: var(--found); background: var(--found-bg); border: 1px solid var(--found-border);
      padding: .2rem .55rem; border-radius: 4px;
    }
    .results-note { text-align: center; font-size: .775rem; color: var(--text-dim); margin-top: 1rem; }

    /* "Nicht gefunden was du gesucht hast?" Button (unterhalb Ergebnisliste) */
    .notfound-btn {
      display: flex; align-items: center; gap: .45rem;
      margin: 1.25rem auto 0;
      background: none; border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: .78rem; font-weight: 500;
      padding: .5rem .9rem; border-radius: 20px;
      cursor: pointer; transition: color .15s, border-color .15s, background .15s;
    }
    .notfound-btn:hover { color: var(--text-muted); border-color: var(--text-dim); background: var(--bg); }
    .notfound-btn.hidden { display: none; }
    .consumer-wrap { display: none; }       /* unsichtbar bis notfound-btn geklickt */
    .consumer-wrap.visible { display: block; }

    /* Consumer guidance (collapsible) */
    .consumer-wrap {
      margin-top: .75rem;
      border: 1px solid var(--border-sub);
      border-radius: var(--radius);
      background: var(--bg-card);
      overflow: hidden;
    }
    .consumer-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1rem;
      background: none; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: .8rem; font-weight: 600;
      color: var(--text-muted);
      text-align: left;
      transition: color .15s, background .15s;
      gap: .5rem;
    }
    .consumer-toggle:hover { color: var(--text); background: var(--bg); }
    .consumer-toggle .chevron {
      flex-shrink: 0; color: var(--text-dim);
      transition: transform .2s;
    }
    .consumer-wrap.open .chevron { transform: rotate(180deg); }
    .consumer-body {
      display: none;
      padding: 0 1rem 1rem;
      border-top: 1px solid var(--border-sub);
    }
    .consumer-wrap.open .consumer-body { display: block; }
    .consumer-body p {
      font-size: .8rem; color: var(--text-muted);
      line-height: 1.65; margin: .75rem 0 .625rem;
    }
    .consumer-body ul {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: .4rem;
    }
    .consumer-body li {
      display: flex; gap: .6rem; align-items: flex-start;
      font-size: .8rem; color: var(--text-muted); line-height: 1.55;
    }
    .consumer-body li::before {
      content: '';
      flex-shrink: 0;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      margin-top: .5rem;
    }
    .consumer-body a { color: var(--accent); text-decoration: none; }
    .consumer-body a:hover { text-decoration: underline; }

    /* ---- Footer ---- */
    footer {
      border-top: 1px solid var(--border-sub);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    .footer-disclaimer {
      font-size: .78rem; color: var(--text-muted);
      max-width: 620px; margin: 0 auto;
      line-height: 1.65;
      display: flex; align-items: flex-start; justify-content: center; gap: .5rem;
    }
    .footer-disclaimer-text { flex: 1; text-align: center; }
    .info-btn {
      flex-shrink: 0;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--border); border: none;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: .7rem; font-weight: 700;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
      margin-top: 2px;
    }
    .info-btn:hover { background: var(--accent-dim); color: var(--accent); }
    .footer-meta {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-sub);
      font-size: .7rem; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center; gap: .4rem;
    }
    .footer-meta .sep { opacity: .4; }

    /* ---- Info popup ---- */
    .info-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(17,24,39,.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .info-overlay.open { display: flex; }
    .info-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      max-width: 520px; width: 100%;
      padding: 1.75rem;
      position: relative;
    }
    .info-modal-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--text); margin-bottom: 1rem;
      padding-right: 2rem;
    }
    .info-modal p {
      font-size: .85rem; color: var(--text-muted);
      line-height: 1.65; margin-bottom: .75rem;
    }
    .info-modal p:last-child { margin-bottom: 0; }
    .info-modal a { color: var(--accent); text-decoration: none; word-break: break-all; }
    .info-modal a:hover { text-decoration: underline; }
    .info-modal strong { color: var(--text); font-weight: 600; }
    .info-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: background .15s;
    }
    .info-close:hover { background: var(--border); }

    /* ---- Responsive ---- */
    @media (max-width: 520px) {
      .topbar-sub, .topbar-sep { display: none; }
      .hero { padding: 2rem 1.125rem 0; }
      .results { padding: 1.25rem 1.125rem 3rem; }
      .stats-bar { padding: 0 1.125rem; }
      .badge-reg { display: none; }
    }
  </style>

<body>

  <div class="load-bar" id="loadBar"><div class="load-bar-fill" id="loadFill"></div></div>

  <header class="topbar">
    <div class="topbar-mark">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 12l2 2 4-4"/><rect x="3" y="3" width="18" height="18" rx="3"/>
      </svg>
    </div>
    <span class="topbar-title">Integratori IT</span>
    <span class="topbar-sep">/</span>
    <span class="topbar-sub">Registro degli Integratori Alimentari</span>
    <nav class="lang-switcher" aria-label="Language">
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="it">IT</button>
      <button class="lang-btn" data-lang="en">EN</button>

        foundTitle:    (n) => n === 1 ? '1 risultato trovato' : `${fmt(n)} risultati trovati`,
        foundSub:      (q) => `per \u201c${q}\u201d`,
        foundSubMore:  () => ` \u2014 primi ${MAX_RESULTS} visualizzati`,
        nfTitle:       'Non trovato nel registro',
        nfDesc:        (q) => `\u201c${q}\u201d \u2014 nessuna voce nel registro. Il prodotto potrebbe non essere notificato o registrato con un nome diverso.`,
        moreResults:   (n) => `Affina la ricerca per risultati pi\u00f9 precisi (${fmt(n)} risultati totali).`,
        labelMfr:      'Produttore',

        csvAll:        (n) => `Esporta tutti i ${fmt(n)} risultati`,
        csvHeaders:    'Prodotto;Produttore;Nr. di notifica',
        csvFilename:   'integratori',
        footerRelease: 'Release',
        footerDiscl:   'Questo strumento ha esclusivamente scopo informativo e non costituisce consulenza legale. I dati sono forniti senza garanzia di completezza o aggiornamento.',
        seoTitle:      'Registro degli Integratori Alimentari | Ministerio della Salute',
        seoDesc:       'Verifica subito se un integratore è autorizzato alla vendita in Italia. Cerca tra oltre 111.000 prodotti nel Registro degli Integratori Alimentari del Ministerio della Salute.',
        consumerToggle: 'Cosa può fare il consumatore?',
        notFoundBtn:    'Non hai trovato il prodotto che stavi cercando?',
        consumerIntro:  'Se ritieni che un integratore venga commercializzato in Italia senza la notifica obbligatoria, o se identifichi affermazioni sulla salute potenzialmente fuorvianti, puoi:',

      },
      en: {
        htmlLang:      'en',
        eyebrow:       'Updated ',
        h1:            'Is this food supplement authorized for sale in Italy?',
        desc:          'Search by product name, manufacturer, or notification number in the official Registro degli Integratori Alimentari of the Ministerio della Salute. Products absent from this register cannot lawfully be sold in Italy.',
        placeholder:   'e.g. Omega 3, Rottapharm, 36474 ...',
        loading:       "Loading 111,181 products \u2026",
        statsLoading:  'Loading database \u2026',
        stats:         (n,c,d) => `${n} products \u00b7 ${c} manufacturers \u00b7 updated ${d}`,
        emptyHint:     'Enter a product name, manufacturer, or notification number.',
        foundTitle:    (n) => n === 1 ? '1 result found' : `${fmt(n)} results found`,
        foundSub:      (q) => `for \u201c${q}\u201d`,
        foundSubMore:  () => ` \u2014 showing first ${MAX_RESULTS}`,
        nfTitle:       'Not found in the register',
        nfDesc:        (q) => `\u201c${q}\u201d \u2014 no entry found in the register. The product may not be notified or may be registered under a different name.`,
        moreResults:   (n) => `Refine your search for more precise results (${fmt(n)} total matches).`,
        labelMfr:      'Manufacturer',
        labelCode:     'Notification no.',
        badge:         'Registered',
        csvBtn:        'Download CSV',
        csvAll:        (n) => `Export all ${fmt(n)} results`,
        csvHeaders:    'Product;Manufacturer;Notification No.',
        csvFilename:   'integratori',
        footerRelease: 'Released',
        footerDiscl:   'This tool is provided for informational purposes only and does not constitute legal advice. Data is provided without guarantee of completeness or accuracy.',
        seoTitle:      'Italian Food Supplement Register | Registro degli Integratori Alimentari',
        seoDesc:       'Instantly check if a food supplement is legally authorized for sale in Italy. Search 111,000+ products in the official Registro degli Integratori Alimentari (Ministerio della Salute).',
        consumerToggle: 'What Can Consumers Do?',
        notFoundBtn:    'Couldn\'t find the product you\'re looking for?',
        consumerIntro:  'If you believe a food supplement is being marketed to Italian consumers without the required notification, or if you identify potentially misleading health claims, you can:',
        consumerSteps: [
          'Verify whether the product appears in the official Ministry register (you are already here).',
          'Contact the manufacturer or distributor and request the Ministry notification code.',
          'Submit a report to the <a href="https://www.salute.gov.it/" target="_blank" rel="noopener">Italian Ministry of Health</a>.',
          'File a consumer protection complaint with the Italian Competition Authority: <a href="https://www.agcm.it/segnala-online/" target="_blank" rel="noopener">AGCM – Segnala online</a>.',
          'Report the product to local health authorities or other competent enforcement bodies.',
        ],
        infoTitle:     'Data Source & Attribution',
        infoBody:      `<p><strong>Data origin</strong><br>The data displayed in this tool is sourced from the official Registro degli Integratori Alimentari published by the Ministerio della Salute, Repubblica Italiana, and extracted from the official PDF register available on the ministry's website.</p><p><strong>Data owner</strong><br>Ministerio della Salute, Repubblica Italiana. All rights to the dataset remain with the Ministerio della Salute.</p><p><strong>Disclaimer</strong><br>No guarantee is provided for the completeness, accuracy, or timeliness of the information presented. Discrepancies may exist between this tool and the official PDF register. Always verify against the official source.</p><p><strong>Official source</strong><br><a href="${SOURCE_URL}" target="_blank" rel="noopener">${SOURCE_URL}</a></p>`,
      }
    };

    /* ==================================================
       STATE
    ================================================== */
    const APP_VERSION  = 'v5.5';
    const APP_RELEASE  = '2026-06-12';
    const MAX_RESULTS  = 25;
    let companies   = [];
    let data        = [];
    let searchIndex = [];
    let ready       = false;
    let lang        = 'en';
    let currentHits = [];
    let dbUpdated   = '';
    let dbCount     = 0;
    let dbCompanies = 0;

    const searchInput = document.getElementById('searchInput');
    const clearBtn    = document.getElementById('clearBtn');
    const resultsEl   = document.getElementById('results');
    const statsBar    = document.getElementById('statsBar');
    const loadBar     = document.getElementById('loadBar');
    const loadFill    = document.getElementById('loadFill');

    /* ==================================================
       LANGUAGE
    ================================================== */
    function detectLang() {
      const hash = window.location.hash.match(/#lang=(\w+)/);
      if (hash && T[hash[1]]) return hash[1];
      return 'en';
    }

    function setLang(l) {
      lang = l;
      document.documentElement.lang = T[l].htmlLang;
      document.title = T[l].seoTitle;
      document.querySelector('meta[name="description"]').content = T[l].seoDesc;
      window.location.hash = '#lang=' + l;
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === l)
      );
      renderUI();
      const q = searchInput.value.trim();
      if (q.length >= 2 && ready) doSearch(q);
    }

    function renderUI() {
      const t = T[lang];
      document.getElementById('eyebrowText').textContent = t.eyebrow;
      document.getElementById('heroTitle').textContent   = t.h1;
      document.getElementById('heroDesc').textContent    = t.desc;
      searchInput.placeholder = t.placeholder;
      statsBar.textContent = ready
        ? t.stats(fmt(dbCount), fmt(dbCompanies), dbUpdated)
        : t.statsLoading;
      renderFooter();
      if (!ready) {
        resultsEl.innerHTML = `<div class="state-loading"><span class="spinner"></span>${t.loading}</div>`;
      } else if (!searchInput.value.trim()) {
        showEmpty();
      }
    }

    function renderFooter() {
      const t = T[lang];
      document.getElementById('footer').innerHTML =
        `<div class="footer-disclaimer">` +
          `<span class="footer-disclaimer-text">${t.footerDiscl}</span>` +
          `<button class="info-btn" id="infoBtn" aria-label="More information" title="Data source & attribution">i</button>` +
        `</div>` +
        `<div class="footer-meta">` +
          `<span>${APP_VERSION}</span>` +
          `<span class="sep">|</span>` +
          `<span>${t.footerRelease} ${APP_RELEASE}</span>` +
        `</div>`;
      document.getElementById('infoBtn').addEventListener('click', openInfo);
    }

    /* ==================================================
       INFO POPUP
    ================================================== */
    function openInfo() {
      const t = T[lang];
      document.getElementById('infoTitle').textContent = t.infoTitle;
      document.getElementById('infoBody').innerHTML    = t.infoBody;
      document.getElementById('infoOverlay').classList.add('open');
      document.getElementById('infoClose').focus();
    }
    function closeInfo() {
      document.getElementById('infoOverlay').classList.remove('open');
    }
    document.getElementById('infoClose').addEventListener('click', closeInfo);
    document.getElementById('infoOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeInfo();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeInfo();
    });

    /* ==================================================
       HELPERS
    ================================================== */
    function fmt(n) {
      return n.toLocaleString(lang === 'de' ? 'de-CH' : lang === 'it' ? 'it-IT' : 'en-US');
    }
    function escHtml(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ==================================================
       LOAD DATA
    ================================================== */
    async function loadData() {
      try {
        loadFill.style.width = '30%';
        const res = await fetch('./data/integratori.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        loadFill.style.width = '70%';
        const json = await res.json();
        loadFill.style.width = '90%';

        companies   = json.co;
        data        = json.d;
        dbCount     = data.length;
        dbCompanies = companies.length;
        dbUpdated   = (json.updated || '').replace(/\//g, '.');
        document.getElementById('updateDate').textContent = dbUpdated;

        searchIndex = data.map(e =>
          (e[1] + ' ' + companies[e[0]] + ' ' + e[2]).toLowerCase()
        );

        loadFill.style.width = '100%';
        setTimeout(() => loadBar.classList.add('hidden'), 400);

        ready = true;
        searchInput.disabled = false;
        renderUI();
      } catch(e) {
        loadBar.classList.add('hidden');
        statsBar.textContent = '';
        resultsEl.innerHTML =
          `<p style="color:var(--bad);font-size:.875rem;text-align:center;padding:3rem 0">` +
          `Database could not be loaded: ${escHtml(e.message)}<br>` +
          `<small>Expected: <code>./data/integratori.json</code></small></p>`;
      }
    }

    /* ==================================================
       SEARCH
    ================================================== */
    function doSearch(raw) {
      if (!ready) return;
      const q = raw.trim().toLowerCase();
      clearBtn.classList.toggle('visible', q.length > 0);
      if (q.length === 0) { showEmpty(); return; }
      if (q.length < 2)   { return; }
      const hits = [];
      for (let i = 0; i < searchIndex.length; i++) {
        if (searchIndex[i].includes(q)) {
          hits.push(i);
          if (hits.length >= 200) break;
        }
      }
      if (hits.length === 0) showNotFound(raw.trim());
      else                   showResults(hits, raw.trim());
    }

    /* ==================================================
       RENDER
    ================================================== */
    function showEmpty() {
      const t = T[lang];
      resultsEl.innerHTML = `
        <div class="state-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-dim);margin-bottom:.75rem">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <p class="hint">${escHtml(t.emptyHint)}</p>
        </div>`;
    }

    function showNotFound(query) {
      const t = T[lang];
      resultsEl.innerHTML = `
        <div class="status-banner notfound">
          <div class="banner-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </div>
          <div class="banner-text">
            <strong>${escHtml(t.nfTitle)}</strong>
            <small>${escHtml(t.nfDesc(query))}</small>
          </div>
        </div>
        <button class="notfound-btn" onclick="
          var w = document.getElementById('consumerWrapNF');
          w.classList.add('visible', 'open');
          this.classList.add('hidden');
          w.scrollIntoView({behavior:'smooth', block:'nearest'});
        ">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
          </svg>
          ${escHtml(t.notFoundBtn)}
        </button>
        ${consumerBlock('consumerWrapNF')}`;
    }

    /* Consumer guidance block — wiederverwendbar fuer not-found UND results */
    function consumerBlock(id) {
      const t     = T[lang];
      const steps = t.consumerSteps.map(s => `<li>${s}</li>`).join('');
      return `
        <div class="consumer-wrap" id="${id}">
          <button class="consumer-toggle" onclick="document.getElementById('${id}').classList.toggle('open')">
            <span>${escHtml(t.consumerToggle)}</span>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div class="consumer-body">
            <p>${escHtml(t.consumerIntro)}</p>
            <ul>${steps}</ul>
          </div>
        </div>`;
    }

    function showResults(hits, query) {
      const t     = T[lang];
      const total = hits.length;
      const shown = hits.slice(0, MAX_RESULTS);
      currentHits = hits;

      const csvLabel = total > MAX_RESULTS ? escHtml(t.csvAll(total)) : escHtml(t.csvBtn);

      let html = `
        <div class="status-banner found">
          <div class="banner-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="banner-text">
            <strong>${escHtml(t.foundTitle(total))}</strong>
            <small>${escHtml(t.foundSub(query))}${total > MAX_RESULTS ? escHtml(t.foundSubMore()) : ''}</small>
          </div>
          <button class="csv-btn" onclick="downloadCSV('${escHtml(query).replace(/'/g,"\\'")}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            ${csvLabel}
          </button>
        </div>`;

      for (const idx of shown) {
        const [coIdx, prodotto, codice] = data[idx];
        const impresa = companies[coIdx];
        html += `
          <div class="result-card">
            <div class="card-name">${escHtml(prodotto)}</div>
            <div class="card-meta">
              <div class="meta-field">
                <span class="meta-label">${escHtml(t.labelMfr)}</span>
                <span class="meta-value">${escHtml(impresa)}</span>
              </div>
              <div class="meta-field">
                <span class="meta-label">${escHtml(t.labelCode)}</span>
                <span class="meta-value">${escHtml(codice)}</span>
              </div>
              <span class="badge-reg">${escHtml(t.badge)}</span>
            </div>
          </div>`;
      }

      if (total > MAX_RESULTS) {
        html += `<p class="results-note">${escHtml(t.moreResults(total))}</p>`;
      }

      // "Nicht gefunden was du gesucht hast?" Button + Consumer-Block
      html += `
        <button class="notfound-btn" onclick="
          var w = document.getElementById('consumerWrapResults');
          w.classList.add('visible', 'open');
          this.classList.add('hidden');
          w.scrollIntoView({behavior:'smooth', block:'nearest'});
        ">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
          </svg>
          ${escHtml(t.notFoundBtn)}
        </button>`;
      html += consumerBlock('consumerWrapResults');

      resultsEl.innerHTML = html;
    }

    /* ==================================================
       CSV EXPORT
    ================================================== */
    function downloadCSV(query) {
      const t    = T[lang];
      const rows = [t.csvHeaders];
      for (const idx of currentHits) {
        const [coIdx, prodotto, codice] = data[idx];
        const impresa = companies[coIdx];
        const esc = s => (s.includes(';') || s.includes('"') || s.includes('\n'))
          ? '"' + s.replace(/"/g, '""') + '"' : s;
        rows.push([esc(prodotto), esc(impresa), esc(codice)].join(';'));
      }
      const bom  = '\uFEFF';
      const blob = new Blob([bom + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
      const slug = query.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,30);
      a.href     = url;
      a.download = `${t.csvFilename}-${slug}-${date}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ==================================================
       EVENT LISTENERS
    ================================================== */
    let debounceTimer;
    searchInput.addEventListener('input', e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => doSearch(e.target.value), 180);
    });
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      showEmpty();
      searchInput.focus();
    });
    document.querySelectorAll('.lang-btn').forEach(btn =>
      btn.addEventListener('click', () => setLang(btn.dataset.lang))
    );
    window.addEventListener('hashchange', () => {
      const l = detectLang();
      if (l !== lang) setLang(l);
    });

    /* ==================================================
       INIT
    ================================================== */
    lang = detectLang();
    document.documentElement.lang = T[lang].htmlLang;
    document.querySelectorAll('.lang-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === lang)
    );
    renderUI();
    loadData();
  </script>
</body>
</html>
