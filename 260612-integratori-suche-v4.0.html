<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Italian Supplement Register</title>
  <meta name="description" content="Search Italy's official supplement register — identify products not authorized for sale in the Italian market (Ministerio della Salute)." />
  <meta name="robots" content="index, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:        #1B6B45;
      --accent-mid:    #2a8a5a;
      --accent-dim:    rgba(27, 107, 69, 0.15);
      --bg:            #0e1117;
      --bg-card:       #161b22;
      --bg-card-hover: #1c2330;
      --border:        #30363d;
      --border-sub:    #21262d;
      --text:          #e6edf3;
      --text-muted:    #8b949e;
      --text-dim:      #6e7681;
      --found:         #3fb950;
      --found-bg:      rgba(46, 160, 67, 0.08);
      --found-border:  #238636;
      --bad:           #f85149;
      --bad-bg:        rgba(248, 81, 73, 0.08);
      --bad-border:    #da3633;
      --radius:        8px;
      --radius-lg:     12px;
      --topbar-h:      56px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Topbar ---- */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: var(--topbar-h);
      display: flex; align-items: center;
      padding: 0 1.5rem;
      background: rgba(14, 17, 23, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-sub);
      gap: 0.625rem;
    }

    .topbar-mark {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(27,107,69,.35);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .topbar-mark svg { color: var(--accent-mid); }

    .topbar-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: .975rem; font-weight: 600;
      color: var(--text); letter-spacing: -.01em;
    }

    .topbar-sep  { color: var(--border); margin: 0 .25rem; font-size: .85rem; }
    .topbar-sub  { font-size: .78rem; color: var(--text-muted); }

    /* Language switcher */
    .lang-switcher {
      margin-left: auto;
      display: flex; gap: 2px;
    }

    .lang-btn {
      background: none; border: 1px solid transparent;
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: .72rem; font-weight: 500;
      letter-spacing: .05em; text-transform: uppercase;
      padding: .25rem .5rem; border-radius: 5px;
      cursor: pointer; transition: color .15s, border-color .15s, background .15s;
    }
    .lang-btn:hover { color: var(--text-muted); border-color: var(--border); }
    .lang-btn.active {
      color: var(--accent-mid);
      border-color: rgba(27,107,69,.4);
      background: var(--accent-dim);
    }

    /* ---- Progress bar ---- */
    .load-bar {
      position: fixed; top: var(--topbar-h); left: 0; right: 0;
      height: 2px; background: var(--border-sub); z-index: 99;
    }
    .load-bar-fill {
      height: 100%; width: 0%;
      background: var(--accent-mid);
      transition: width .3s ease;
    }
    .load-bar.hidden { display: none; }

    /* ---- Hero ---- */
    .hero {
      max-width: 680px; margin: 0 auto;
      padding: 3rem 1.5rem 0;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .72rem; font-weight: 500;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--accent-mid);
      margin-bottom: 1rem;
      padding: .25rem .625rem;
      background: var(--accent-dim);
      border: 1px solid rgba(27,107,69,.3);
      border-radius: 20px;
    }

    .hero h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.65rem, 4.5vw, 2.3rem);
      font-weight: 700; line-height: 1.18;
      letter-spacing: -.025em; color: var(--text);
      margin-bottom: .75rem;
    }

    .hero-desc {
      font-size: .9rem; color: var(--text-muted);
      line-height: 1.65; margin-bottom: 2rem; max-width: 520px;
    }

    /* ---- Search ---- */
    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: .9rem 3rem .9rem 3.125rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-input::placeholder { color: var(--text-dim); }

    .search-icon {
      position: absolute; left: 1rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }

    .search-clear {
      position: absolute; right: .875rem; top: 50%;
      transform: translateY(-50%);
      background: var(--border); border: none;
      color: var(--text-muted); cursor: pointer;
      width: 20px; height: 20px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      transition: background .1s, color .1s;
    }
    .search-clear.visible { display: flex; }
    .search-clear:hover { background: var(--text-muted); color: var(--bg); }

    /* ---- Stats ---- */
    .stats-bar {
      max-width: 680px; margin: .625rem auto 0;
      padding: 0 1.5rem;
      font-size: .75rem; color: var(--text-dim); min-height: 1.2em;
    }

    /* ---- Results ---- */
    .results {
      max-width: 680px; margin: 0 auto;
      padding: 1.75rem 1.5rem 4rem;
    }

    .state-empty {
      padding: 3.5rem 1rem; text-align: center; color: var(--text-dim);
    }
    .state-empty .hint { font-size: .825rem; margin-top: .5rem; }

    .state-loading {
      padding: 3rem 1rem; text-align: center;
      color: var(--text-muted); font-size: .875rem;
    }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent-mid);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-banner {
      display: flex; align-items: center; gap: .75rem;
      padding: .875rem 1.125rem; border-radius: var(--radius);
      margin-bottom: 1.125rem; font-size: .875rem; font-weight: 500;
    }
    .status-banner.found    { background: var(--found-bg); border: 1px solid var(--found-border); color: var(--found); }
    .status-banner.notfound { background: var(--bad-bg);   border: 1px solid var(--bad-border);   color: var(--bad);   }

    .banner-icon {
      flex-shrink: 0; width: 20px; height: 20px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .status-banner.found    .banner-icon { background: rgba(63,185,80,.18); }
    .status-banner.notfound .banner-icon { background: rgba(248,81,73,.18); }

    .banner-text strong { display: block; }
    .banner-text small  { font-size: .78rem; font-weight: 400; opacity: .85; margin-top: .15rem; display: block; }

    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border-sub);
      border-left: 3px solid var(--found-border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem; margin-bottom: .625rem;
      transition: background .12s;
    }
    .result-card:hover { background: var(--bg-card-hover); }

    .card-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.05rem; font-weight: 600;
      color: var(--text); margin-bottom: .625rem; line-height: 1.3;
    }

    .card-meta {
      display: flex; flex-wrap: wrap; gap: .5rem 1.5rem; align-items: center;
    }

    .meta-field { display: flex; flex-direction: column; gap: .1rem; }
    .meta-label { font-size: .67rem; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--text-dim); }
    .meta-value { font-size: .85rem; color: var(--text-muted); }

    .badge-reg {
      margin-left: auto;
      font-size: .67rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      color: var(--found); background: var(--found-bg); border: 1px solid var(--found-border);
      padding: .2rem .55rem; border-radius: 4px;
    }

    .results-note { text-align: center; font-size: .775rem; color: var(--text-dim); margin-top: 1rem; }

    /* CSV Download Button */
    .csv-btn {
      margin-left: auto;
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(63, 185, 80, 0.12);
      border: 1px solid var(--found-border);
      color: var(--found);
      font-family: 'Inter', sans-serif;
      font-size: .72rem; font-weight: 500;
      letter-spacing: .02em;
      padding: .35rem .75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .csv-btn:hover {
      background: rgba(63, 185, 80, 0.22);
    }

    /* ---- Footer ---- */
    footer {
      border-top: 1px solid var(--border-sub);
      padding: 1.5rem; text-align: center;
      font-size: .73rem; color: var(--text-dim); line-height: 1.8;
    }
    footer a { color: var(--text-dim); text-decoration: none; transition: color .15s; }
    footer a:hover { color: var(--accent-mid); }
    footer .sep { margin: 0 .4rem; opacity: .4; }

    /* ---- Responsive ---- */
    @media (max-width: 520px) {
      .topbar-sub, .topbar-sep { display: none; }
      .hero { padding: 2rem 1.125rem 0; }
      .results { padding: 1.25rem 1.125rem 3rem; }
      .stats-bar { padding: 0 1.125rem; }
      .badge-reg { display: none; }
      .csv-btn span { display: none; }
    }
  </style>
</head>
<body>

  <div class="load-bar" id="loadBar"><div class="load-bar-fill" id="loadFill"></div></div>

  <header class="topbar">
    <div class="topbar-mark">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 12l2 2 4-4"/><rect x="3" y="3" width="18" height="18" rx="3"/>
      </svg>
    </div>
    <span class="topbar-title">Integratori IT</span>
    <span class="topbar-sep">/</span>
    <span class="topbar-sub">Registro degli Integratori Alimentari</span>
    <nav class="lang-switcher" aria-label="Language">
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="it">IT</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </nav>
  </header>

  <main>
    <div class="hero">
      <span class="hero-eyebrow">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>
        <span id="eyebrowText"></span><span id="updateDate"></span>
      </span>
      <h1 id="heroTitle"></h1>
      <p class="hero-desc" id="heroDesc"></p>
      <div class="search-wrap">
        <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="searchInput" class="search-input"
          autocomplete="off" spellcheck="false" disabled />
        <button class="search-clear" id="clearBtn" aria-label="Clear">
          <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M1 1l10 10M11 1L1 11"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="stats-bar" id="statsBar"></div>
    <div class="results" id="results"></div>
  </main>

  <footer id="footer"></footer>

  <script>
    /* ==================================================
       TRANSLATIONS
    ================================================== */
    const T = {
      de: {
        htmlLang:       'de',
        eyebrow:        'Stand: ',
        h1:             'Ist das Supplement in Italien zugelassen?',
        desc:           'Suche nach Produktname, Hersteller oder Notifizierungsnummer im offiziellen Registro degli Integratori Alimentari des Ministerio della Salute.',
        placeholder:    'z.B. Omega 3, Rottapharm, 36474 ...',
        loading:        "111'181 Eintraege werden geladen ...",
        statsLoading:   'Datenbank wird geladen ...',
        stats:          (n, c, d) => `${n} Produkte \u00b7 ${c} Hersteller \u00b7 Stand ${d}`,
        emptyHint:      'Produktname, Hersteller oder Notifizierungsnummer eingeben.',
        foundTitle:     (n) => n === 1 ? '1 Eintrag gefunden' : `${fmt(n)} Eintraege gefunden`,
        foundSub:       (q) => `fuer \u201e${q}\u201c`,
        foundSubMore:   (n) => ` \u2014 erste ${MAX_RESULTS} werden angezeigt`,
        nfTitle:        'Nicht im Register gefunden',
        nfDesc:         (q) => `\u201e${q}\u201c \u2014 kein Eintrag im Registro degli Integratori Alimentari. Das Produkt ist moeglicherweise nicht notifiziert oder unter anderem Namen registriert.`,
        moreResults:    (n) => `Suche verfeinern fuer praezisere Ergebnisse (${fmt(n)} Treffer gesamt).`,
        labelMfr:       'Hersteller',
        labelCode:      'Notifizierungsnr.',
        badge:          'Registrato',
        csvBtn:         'CSV herunterladen',
        csvAll:         (n) => `Alle ${fmt(n)} Eintraege exportieren`,
        csvHeaders:     'Produkt;Hersteller;Notifizierungsnummer',
        csvFilename:    'integratori',
        footerSrc:      'Quelle',
        footerDiscl:    'Kein Anspruch auf Vollstaendigkeit. Massgeblich ist ausschliesslich das offizielle Register.',
      },
      it: {
        htmlLang:       'it',
        eyebrow:        'Aggiornato al ',
        h1:             'Il supplemento \u00e8 autorizzato in Italia?',
        desc:           'Cerca per nome del prodotto, produttore o numero di notifica nel Registro degli Integratori Alimentari del Ministerio della Salute.',
        placeholder:    'es. Omega 3, Rottapharm, 36474 ...',
        loading:        "Caricamento di 111'181 prodotti ...",
        statsLoading:   'Caricamento del database ...',
        stats:          (n, c, d) => `${n} prodotti \u00b7 ${c} produttori \u00b7 aggiornato al ${d}`,
        emptyHint:      'Inserisci il nome del prodotto, il produttore o il numero di notifica.',
        foundTitle:     (n) => n === 1 ? '1 risultato trovato' : `${fmt(n)} risultati trovati`,
        foundSub:       (q) => `per \u201c${q}\u201d`,
        foundSubMore:   (n) => ` \u2014 primi ${MAX_RESULTS} visualizzati`,
        nfTitle:        'Non trovato nel registro',
        nfDesc:         (q) => `\u201c${q}\u201d \u2014 nessuna voce nel Registro degli Integratori Alimentari. Il prodotto potrebbe non essere notificato o registrato con un nome diverso.`,
        moreResults:    (n) => `Affina la ricerca per risultati pi\u00f9 precisi (${fmt(n)} risultati totali).`,
        labelMfr:       'Produttore',
        labelCode:      'Nr. di notifica',
        badge:          'Registrato',
        csvBtn:         'Scarica CSV',
        csvAll:         (n) => `Esporta tutti i ${fmt(n)} risultati`,
        csvHeaders:     'Prodotto;Produttore;Nr. di notifica',
        csvFilename:    'integratori',
        footerSrc:      'Fonte',
        footerDiscl:    'Nessuna garanzia di completezza. Fare riferimento esclusivamente al registro ufficiale.',
      },
      en: {
        htmlLang:       'en',
        eyebrow:        'Updated ',
        h1:             'Is this supplement authorized for sale in Italy?',
        desc:           'Search by product name, manufacturer, or notification number in the official Registro degli Integratori Alimentari of the Ministerio della Salute. Products absent from this register have not completed mandatory notification and cannot lawfully be sold in Italy.',
        placeholder:    'e.g. Omega 3, Rottapharm, 36474 ...',
        loading:        "Loading 111,181 products ...",
        statsLoading:   'Loading database ...',
        stats:          (n, c, d) => `${n} products \u00b7 ${c} manufacturers \u00b7 updated ${d}`,
        emptyHint:      'Enter a product name, manufacturer, or notification number.',
        foundTitle:     (n) => n === 1 ? '1 result found' : `${fmt(n)} results found`,
        foundSub:       (q) => `for \u201c${q}\u201d`,
        foundSubMore:   (n) => ` \u2014 showing first ${MAX_RESULTS}`,
        nfTitle:        'Not found in the register',
        nfDesc:         (q) => `\u201c${q}\u201d \u2014 no entry in the Registro degli Integratori Alimentari. This product may not be notified or may be registered under a different name.`,
        moreResults:    (n) => `Refine your search for more precise results (${fmt(n)} total matches).`,
        labelMfr:       'Manufacturer',
        labelCode:      'Notification no.',
        badge:          'Registered',
        csvBtn:         'Download CSV',
        csvAll:         (n) => `Export all ${fmt(n)} results`,
        csvHeaders:     'Product;Manufacturer;Notification No.',
        csvFilename:    'integratori',
        footerSrc:      'Source',
        footerDiscl:    'No guarantee of completeness or accuracy. The official register is the sole authoritative source.',
      }
    };

    /* ==================================================
       STATE
    ================================================== */
    const MAX_RESULTS = 25;
    let companies   = [];
    let data        = [];
    let searchIndex = [];
    let ready       = false;
    let lang        = 'en';
    let currentHits = [];   // alle Treffer der letzten Suche (fuer CSV-Export)
    let dbUpdated   = '';
    let dbCount     = 0;
    let dbCompanies = 0;

    const searchInput = document.getElementById('searchInput');
    const clearBtn    = document.getElementById('clearBtn');
    const resultsEl   = document.getElementById('results');
    const statsBar    = document.getElementById('statsBar');
    const loadBar     = document.getElementById('loadBar');
    const loadFill    = document.getElementById('loadFill');

    /* ==================================================
       LANGUAGE
    ================================================== */
    function detectLang() {
      const hash = window.location.hash.match(/#lang=(\w+)/);
      if (hash && T[hash[1]]) return hash[1];
      const nav = (navigator.language || '').slice(0, 2).toLowerCase();
      return T[nav] ? nav : 'en';
    }

    function setLang(l) {
      lang = l;
      document.documentElement.lang = T[l].htmlLang;
      window.location.hash = '#lang=' + l;
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === l);
      });
      renderUI();
      // Suchergebnis neu rendern falls aktive Suche
      const q = searchInput.value.trim();
      if (q.length >= 2 && ready) doSearch(q);
    }

    function renderUI() {
      const t = T[lang];
      document.getElementById('eyebrowText').textContent = t.eyebrow;
      document.getElementById('heroTitle').textContent   = t.h1;
      document.getElementById('heroDesc').textContent    = t.desc;
      searchInput.placeholder = t.placeholder;

      if (!ready) {
        statsBar.textContent = t.statsLoading;
      } else {
        statsBar.textContent = t.stats(
          fmt(dbCount), fmt(dbCompanies), dbUpdated
        );
      }

      renderFooter();

      if (!ready) {
        resultsEl.innerHTML = `<div class="state-loading"><span class="spinner"></span>${t.loading}</div>`;
      } else if (!searchInput.value.trim()) {
        showEmpty();
      }
    }

    function renderFooter() {
      const t = T[lang];
      document.getElementById('footer').innerHTML =
        `<span>${t.footerSrc}: <a href="https://www.salute.gov.it/new/it/tema/alimenti-fini-medici-speciali-ed-integratori/registro-degli-integratori-alimentari/" target="_blank" rel="noopener">Ministerio della Salute, Registro degli Integratori Alimentari</a></span>` +
        `<span class="sep">|</span><span>${t.footerDiscl}</span>`;
    }

    /* ==================================================
       HELPERS
    ================================================== */
    function fmt(n) {
      return n.toLocaleString(lang === 'de' ? 'de-CH' : lang === 'it' ? 'it-IT' : 'en-US');
    }

    function escHtml(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ==================================================
       LOAD DATA
    ================================================== */
    async function loadData() {
      try {
        loadFill.style.width = '30%';
        const res = await fetch('./data/integratori.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        loadFill.style.width = '70%';
        const json = await res.json();
        loadFill.style.width = '90%';

        companies   = json.co;
        data        = json.d;
        dbCount     = data.length;
        dbCompanies = companies.length;

        // Datum formatieren: DD/MM/YYYY
        if (json.updated) {
          dbUpdated = json.updated.replace(/\//g, '.');
        }
        document.getElementById('updateDate').textContent = dbUpdated;

        searchIndex = data.map(e =>
          (e[1] + ' ' + companies[e[0]] + ' ' + e[2]).toLowerCase()
        );

        loadFill.style.width = '100%';
        setTimeout(() => loadBar.classList.add('hidden'), 400);

        ready = true;
        searchInput.disabled = false;
        renderUI();

      } catch (e) {
        loadBar.classList.add('hidden');
        statsBar.textContent = '';
        resultsEl.innerHTML =
          `<p style="color:var(--bad);font-size:.875rem;text-align:center;padding:3rem 0">` +
          `Database could not be loaded: ${escHtml(e.message)}<br>` +
          `<small>Expected path: <code>./data/integratori.json</code></small></p>`;
      }
    }

    /* ==================================================
       SEARCH
    ================================================== */
    function doSearch(raw) {
      if (!ready) return;
      const q = raw.trim().toLowerCase();
      clearBtn.classList.toggle('visible', q.length > 0);
      if (q.length === 0) { showEmpty(); return; }
      if (q.length < 2)   { return; }

      const hits = [];
      for (let i = 0; i < searchIndex.length; i++) {
        if (searchIndex[i].includes(q)) {
          hits.push(i);
          if (hits.length >= 200) break;
        }
      }

      if (hits.length === 0) { showNotFound(raw.trim()); }
      else                   { showResults(hits, raw.trim()); }
    }

    /* ==================================================
       RENDER STATES
    ================================================== */
    function showEmpty() {
      const t = T[lang];
      resultsEl.innerHTML = `
        <div class="state-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-dim);margin-bottom:.75rem">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <p class="hint">${escHtml(t.emptyHint)}</p>
        </div>`;
    }

    function showNotFound(query) {
      const t = T[lang];
      resultsEl.innerHTML = `
        <div class="status-banner notfound">
          <div class="banner-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </div>
          <div class="banner-text">
            <strong>${escHtml(t.nfTitle)}</strong>
            <small>${escHtml(t.nfDesc(query))}</small>
          </div>
        </div>`;
    }

    function showResults(hits, query) {
      const t     = T[lang];
      const total = hits.length;
      const shown = hits.slice(0, MAX_RESULTS);
      currentHits = hits;   // fuer CSV-Export merken

      const csvLabel = total > MAX_RESULTS
        ? escHtml(t.csvAll(total))
        : escHtml(t.csvBtn);

      let html = `
        <div class="status-banner found">
          <div class="banner-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="banner-text">
            <strong>${escHtml(t.foundTitle(total))}</strong>
            <small>${escHtml(t.foundSub(query))}${total > MAX_RESULTS ? escHtml(t.foundSubMore(total)) : ''}</small>
          </div>
          <button class="csv-btn" onclick="downloadCSV('${escHtml(query).replace(/'/g,"\\'")}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            ${csvLabel}
          </button>
        </div>`;

      for (const idx of shown) {
        const [coIdx, prodotto, codice] = data[idx];
        const impresa = companies[coIdx];
        html += `
          <div class="result-card">
            <div class="card-name">${escHtml(prodotto)}</div>
            <div class="card-meta">
              <div class="meta-field">
                <span class="meta-label">${escHtml(t.labelMfr)}</span>
                <span class="meta-value">${escHtml(impresa)}</span>
              </div>
              <div class="meta-field">
                <span class="meta-label">${escHtml(t.labelCode)}</span>
                <span class="meta-value">${escHtml(codice)}</span>
              </div>
              <span class="badge-reg">${escHtml(t.badge)}</span>
            </div>
          </div>`;
      }

      if (total > MAX_RESULTS) {
        html += `<p class="results-note">${escHtml(t.moreResults(total))}</p>`;
      }

      resultsEl.innerHTML = html;
    }

    /* ==================================================
       CSV EXPORT
       Alle Treffer (nicht nur die angezeigten 25), UTF-8 BOM,
       Semikolon-getrennt fuer Excel-Kompatibilitaet.
    ================================================== */
    function downloadCSV(query) {
      const t    = T[lang];
      const rows = [t.csvHeaders];

      for (const idx of currentHits) {
        const [coIdx, prodotto, codice] = data[idx];
        const impresa = companies[coIdx];
        // Felder mit Semikolon oder Anführungszeichen werden escaped
        const esc = s => s.includes(';') || s.includes('"') || s.includes('\n')
          ? '"' + s.replace(/"/g, '""') + '"'
          : s;
        rows.push([esc(prodotto), esc(impresa), esc(codice)].join(';'));
      }

      const bom  = '\uFEFF';
      const blob = new Blob([bom + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      const slug = query.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30);
      a.href     = url;
      a.download = `${t.csvFilename}-${slug}-${date}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ==================================================
       EVENT LISTENERS
    ================================================== */
    let debounceTimer;
    searchInput.addEventListener('input', e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => doSearch(e.target.value), 180);
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      showEmpty();
      searchInput.focus();
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.lang));
    });

    window.addEventListener('hashchange', () => {
      const l = detectLang();
      if (l !== lang) setLang(l);
    });

    /* ==================================================
       INIT
    ================================================== */
    lang = detectLang();
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    document.documentElement.lang = T[lang].htmlLang;
    renderUI();
    loadData();
  </script>

</body>
</html>
